<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Following Feed</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* Prevent flicker of elements */
    [style*="display: none"] { display: none !important; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <a href="a_filter.html" class="logo">
      <span>&#127860;</span> FarmToTable
    </a>
    <nav>
      <a href="g_following_feed.html" class="active">Following</a>
      <a href="a_filter.html">Discover</a>
      <a href="#">My Recipes</a>
      <a href="#">Meal Lists</a>
    </nav>
    <div class="user-section">
      <div class="notification-icon" onclick="toggleNotifications(event)">
        &#128276;
        <span class="badge" id="notifBadge">2</span>
        <div class="notification-dropdown" id="notifDropdown" style="display:none;" onclick="event.stopPropagation()">
          <div class="notif-header">Notifications</div>
          <div class="notif-item unread" onclick="readNotif(this)">
            <strong>Chef Emily</strong> added a new recipe: <em>Garlic Butter Salmon</em>
            <div class="time">2 hours ago</div>
          </div>
          <div class="notif-item" onclick="readNotif(this)">
            <strong>Chef Marcus</strong> posted: <em>Vegan Tacos</em>
            <div class="time">1 day ago</div>
          </div>
        </div>
      </div>
      <div class="cart-icon" onclick="window.location.href='d_shop.html'">
        &#128722;
        <span class="badge">0</span>
      </div>
      <a href="f_profile.html" class="avatar">HC</a>
    </div>
  </header>

  <div class="container">
    <div class="page-header" style="text-align: center;">
      <h1>Your Feed</h1>
      <p>Latest recipes from the chefs you follow</p>
    </div>

    <!-- Feed Container -->
    <div class="feed-container" id="feedContainer">
      <!-- Populated by JS -->
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script>
    function renderStars(rating) {
      const full = Math.floor(rating);
      const half = rating - full >= 0.5;
      let html = '';
      for (let i = 0; i < full; i++) html += '&#9733;';
      if (half) html += '&#9733;';
      for (let i = full + (half?1:0); i < 5; i++) html += '<span class="empty">&#9733;</span>';
      return html;
    }

    function renderFeed() {
      // Mock logic: filter RECIPES to show only those from Chef Marcus and Chef Emily (if she had ones)
      // We'll just grab the ones from Chef Marco Rossi as a mock
      const feedRecipes = RECIPES.filter(r => r.chef === "Chef Marco Rossi" || r.chef === "Chef Aisha Patel");
      
      const container = document.getElementById('feedContainer');

      // Random "Time ago" mock for feed realism
      const times = ["2 hours ago", "5 hours ago", "1 day ago", "2 days ago"];

      container.innerHTML = feedRecipes.map((r, i) => `
        <div class="feed-card">
          <div class="feed-header" onclick="window.location.href='f_profile.html'">
            <div class="feed-avatar">&#128104;&#8205;&#127859;</div>
            <div class="feed-meta">
              <h4>${r.chef}</h4>
              <span>Posted ${times[i % times.length]}</span>
            </div>
            <div style="flex-grow:1; text-align:right;">
              <span style="font-size:1.2rem;color:#ccc;cursor:pointer;">&#8942;</span>
            </div>
          </div>
          <div class="card-img" onclick="window.location.href='c_detail.html?id=${r.id}'">
            ${r.image}
          </div>
          <div class="card-body">
            <h3 style="margin-bottom:8px;font-size:1.2rem;">${r.title}</h3>
            <div style="color:#555;font-size:0.9rem;margin-bottom:12px;">
              ${r.description}
            </div>
            <div class="card-meta" style="display:flex; gap:16px; color:#888; font-size:0.85rem; margin-bottom:16px;">
              <span>&#9201; ${r.time} min</span>
              <span>${r.difficulty}</span>
              ${r.diet.length ? `<span style="color:#27ae60;font-weight:600;">${r.diet[0]}</span>` : ''}
            </div>
            <div class="card-footer" style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f0ebe5; padding-top:16px;">
              <div class="stars">${renderStars(r.rating)} <span style="color:#999;font-size:0.78rem;">(${r.reviewCount})</span></div>
              <button class="btn btn-primary" style="padding: 6px 16px; font-size: 0.85rem;" onclick="window.location.href='c_detail.html?id=${r.id}'">View Recipe</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    renderFeed();
  </script>
</body>
</html>
